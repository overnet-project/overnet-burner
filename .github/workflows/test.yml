name: run-tests

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - '.perlcriticrc'
      - '.perltidyrc'
      - 'bin/**'
      - 'cpanfile'
      - 'examples/**'
      - 'lib/**'
      - 'Makefile.PL'
      - 'scenarios/**'
      - 'schemas/**'
      - 't/**'
      - 'xt/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - '.perlcriticrc'
      - '.perltidyrc'
      - 'bin/**'
      - 'cpanfile'
      - 'examples/**'
      - 'lib/**'
      - 'Makefile.PL'
      - 'scenarios/**'
      - 'schemas/**'
      - 't/**'
      - 'xt/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl: ['5.40', 'latest']
    name: Perl ${{ matrix.perl }}
    env:
      PERL5LIB: /home/runner/perl5/lib/perl5
      PERL_LOCAL_LIB_ROOT: /home/runner/perl5
      PERL_MB_OPT: --install_base /home/runner/perl5
      PERL_MM_OPT: INSTALL_BASE=/home/runner/perl5

    steps:
      - uses: actions/checkout@v4

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - uses: actions/cache@v4
        with:
          path: ~/perl5
          key: perl-${{ matrix.perl }}-${{ hashFiles('Makefile.PL', 'cpanfile', '.github/workflows/test.yml') }}

      - name: Install dependencies
        run: |
          cpanm --local-lib ~/perl5 --installdeps .
          cpanm --local-lib ~/perl5 --reinstall https://github.com/overnet-project/overnet-perl-style/archive/refs/heads/main.tar.gz

      - name: Enable localhost sshd for connect-transport tests
        run: |
          sudo systemctl start ssh || sudo service ssh start || {
            sudo apt-get update && sudo apt-get install -y openssh-server
            sudo systemctl start ssh
          }
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/burner_test
          cat ~/.ssh/burner_test.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -i ~/.ssh/burner_test "$USER@localhost" true
          {
            echo "OVERNET_BURNER_TEST_SSH_HOST=localhost"
            echo "OVERNET_BURNER_TEST_SSH_USER=$USER"
            echo "OVERNET_BURNER_TEST_SSH_KEY=$HOME/.ssh/burner_test"
          } >> "$GITHUB_ENV"

      - name: Detect container engines for container-method tests
        run: |
          engines=""
          docker info > /dev/null 2>&1 && engines="docker"
          podman info > /dev/null 2>&1 && engines="$engines podman"
          echo "OVERNET_BURNER_TEST_CONTAINER_ENGINES=${engines# }" >> "$GITHUB_ENV"
          echo "container engines available: ${engines:-none}"

      - uses: actions/cache@v4
        with:
          path: ~/images
          key: debian-12-genericcloud-amd64-v1

      - name: Provision qemu and a cloud image for virtual-method tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 genisoimage
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm; fi
          if [ ! -w /dev/kvm ]; then
            echo "no usable /dev/kvm; the real virtual-method test will be skipped"
            exit 0
          fi
          mkdir -p ~/images
          if [ ! -f ~/images/debian-12-genericcloud-amd64.qcow2 ]; then
            curl -fsSL --retry 3 -o ~/images/debian-12-genericcloud-amd64.qcow2 \
              "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
          fi
          echo "OVERNET_BURNER_TEST_VIRTUAL_IMAGE=$HOME/images/debian-12-genericcloud-amd64.qcow2" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          prove -r -l -v t/
          prove -r -l -v xt/author/
