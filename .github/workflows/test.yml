name: run-tests

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - '.perlcriticrc'
      - '.perltidyrc'
      - 'README.md'
      - 'bin/**'
      - 'docs/**'
      - 'examples/**'
      - 'lib/**'
      - 'MANIFEST'
      - 'Makefile.PL'
      - 'profile-templates/**'
      - 'scenarios/**'
      - 'schemas/**'
      - 't/**'
      - 'xt/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - '.perlcriticrc'
      - '.perltidyrc'
      - 'README.md'
      - 'bin/**'
      - 'docs/**'
      - 'examples/**'
      - 'lib/**'
      - 'MANIFEST'
      - 'Makefile.PL'
      - 'profile-templates/**'
      - 'scenarios/**'
      - 'schemas/**'
      - 't/**'
      - 'xt/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl: ['5.40', 'latest']
    name: Perl ${{ matrix.perl }}
    env:
      PERL5LIB: /home/runner/perl5/lib/perl5
      PERL_LOCAL_LIB_ROOT: /home/runner/perl5
      PERL_MB_OPT: --install_base /home/runner/perl5
      PERL_MM_OPT: INSTALL_BASE=/home/runner/perl5
    defaults:
      run:
        working-directory: overnet-burner

    steps:
      - uses: actions/checkout@v4
        with:
          path: overnet-burner

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/core-perl
          path: core-perl

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/relay-perl
          path: relay-perl

      - uses: shogo82148/actions-setup-perl@v1
        id: setup-perl
        with:
          perl-version: ${{ matrix.perl }}

      - uses: actions/cache@v4
        with:
          path: ~/perl5
          key: perl-${{ steps.setup-perl.outputs.perl-version }}-${{ hashFiles('overnet-burner/Makefile.PL', 'overnet-burner/.github/workflows/test.yml') }}

      - name: Install dependencies
        run: |
          cpanm --local-lib ~/perl5 --installdeps .
          cpanm --local-lib ~/perl5 --reinstall https://github.com/overnet-project/overnet-perl-style/archive/refs/heads/main.tar.gz
          echo "$HOME/perl5/bin" >> "$GITHUB_PATH"

      - name: Enable localhost sshd for connect-transport tests
        run: |
          sudo systemctl start ssh || sudo service ssh start || {
            sudo apt-get update && sudo apt-get install -y openssh-server
            sudo systemctl start ssh
          }
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/burner_test
          cat ~/.ssh/burner_test.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -i ~/.ssh/burner_test "$USER@localhost" true
          {
            echo "OVERNET_BURNER_TEST_SSH_HOST=localhost"
            echo "OVERNET_BURNER_TEST_SSH_USER=$USER"
            echo "OVERNET_BURNER_TEST_SSH_KEY=$HOME/.ssh/burner_test"
          } >> "$GITHUB_ENV"

      - name: Detect container engines for container-method tests
        run: |
          engines=""
          docker info > /dev/null 2>&1 && engines="docker"
          podman info > /dev/null 2>&1 && engines="$engines podman"
          echo "OVERNET_BURNER_TEST_CONTAINER_ENGINES=${engines# }" >> "$GITHUB_ENV"
          echo "container engines available: ${engines:-none}"

      - uses: actions/cache@v4
        with:
          path: ~/images
          key: debian-12-genericcloud-amd64-v1

      - name: Provision qemu and a cloud image for virtual-method tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 genisoimage
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm; fi
          if [ ! -w /dev/kvm ]; then
            echo "no usable /dev/kvm; the real virtual-method test will be skipped"
            exit 0
          fi
          mkdir -p ~/images
          if [ ! -f ~/images/debian-12-genericcloud-amd64.qcow2 ]; then
            curl -fsSL --retry 3 -o ~/images/debian-12-genericcloud-amd64.qcow2 \
              "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
          fi
          echo "OVERNET_BURNER_TEST_VIRTUAL_IMAGE=$HOME/images/debian-12-genericcloud-amd64.qcow2" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          prove -r -l -v t/
          prove -r -l -v xt/author/

  adversary-regression:
    runs-on: ubuntu-latest
    name: Adversary regression
    env:
      PERL5LIB: /home/runner/perl5/lib/perl5
      PERL_LOCAL_LIB_ROOT: /home/runner/perl5
      PERL_MB_OPT: --install_base /home/runner/perl5
      PERL_MM_OPT: INSTALL_BASE=/home/runner/perl5
    defaults:
      run:
        working-directory: overnet-burner

    steps:
      - uses: actions/checkout@v4
        with:
          path: overnet-burner

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/core-perl
          path: core-perl

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/relay-perl
          path: relay-perl

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'

      - uses: actions/cache@v4
        with:
          path: ~/perl5
          key: perl-5.40-${{ hashFiles('overnet-burner/Makefile.PL', 'overnet-burner/.github/workflows/test.yml') }}

      - name: Install dependencies
        run: |
          cpanm --local-lib ~/perl5 --installdeps .
          echo "$HOME/perl5/bin" >> "$GITHUB_PATH"

      - name: Replay the adversary catalog against the real relay
        run: |
          prove -r -l -v t/adversary-attack.t t/adversary-oracle.t t/adversary-runner.t \
            t/adversary-session.t t/adversary-adaptive.t t/adversary-live-arena.t t/adversary-server.t \
            t/adversary-fuzzer.t t/adversary-corpus.t t/adversary-campaign.t

  coverage:
    runs-on: ubuntu-latest
    name: Adversary coverage
    env:
      PERL5LIB: /home/runner/perl5/lib/perl5
      PERL_LOCAL_LIB_ROOT: /home/runner/perl5
      PERL_MB_OPT: --install_base /home/runner/perl5
      PERL_MM_OPT: INSTALL_BASE=/home/runner/perl5
    defaults:
      run:
        working-directory: overnet-burner

    steps:
      - uses: actions/checkout@v4
        with:
          path: overnet-burner

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/core-perl
          path: core-perl

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/relay-perl
          path: relay-perl

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'

      - uses: actions/cache@v4
        with:
          path: ~/perl5
          key: perl-coverage-5.40-${{ hashFiles('overnet-burner/Makefile.PL', 'overnet-burner/.github/workflows/test.yml') }}

      - name: Install dependencies
        run: |
          cpanm --local-lib ~/perl5 --installdeps .
          cpanm --local-lib ~/perl5 --notest Devel::Cover
          echo "$HOME/perl5/bin" >> "$GITHUB_PATH"

      - name: Enforce adversary coverage thresholds
        env:
          OVERNET_COVERAGE: '1'
        run: prove -l -v xt/author/coverage.t

  managed-local-containers-smoke:
    runs-on: ubuntu-latest
    needs: test
    name: Managed local-containers smoke
    env:
      PERL5LIB: /home/runner/perl5/lib/perl5
      PERL_LOCAL_LIB_ROOT: /home/runner/perl5
      PERL_MB_OPT: --install_base /home/runner/perl5
      PERL_MM_OPT: INSTALL_BASE=/home/runner/perl5
    defaults:
      run:
        working-directory: overnet-burner

    steps:
      - uses: actions/checkout@v4
        with:
          path: overnet-burner

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/core-perl
          path: core-perl

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/relay-perl
          path: relay-perl

      - uses: shogo82148/actions-setup-perl@v1
        id: setup-perl
        with:
          perl-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/perl5
          key: perl-smoke-${{ steps.setup-perl.outputs.perl-version }}-${{ hashFiles('overnet-burner/Makefile.PL', 'overnet-burner/.github/workflows/test.yml') }}

      - name: Install dependencies
        run: |
          cpanm --local-lib ~/perl5 --installdeps .
          echo "$HOME/perl5/bin" >> "$GITHUB_PATH"

      - name: Verify Docker is available
        run: |
          docker info

      - name: Run managed local-containers smoke
        run: |
          PERL5LIB=lib:$PERL5LIB bin/overnet-burner run \
            --scenario scenarios/local-containers-smoke.yml \
            --runs-dir runs \
            --run-id ci-local-containers-smoke \
            --runner rex-local-workers

  devel-cover:
    runs-on: ubuntu-latest
    name: Devel::Cover gate
    timeout-minutes: 90
    env:
      PERL5LIB: /home/runner/perl5/lib/perl5:${{ github.workspace }}/core-perl/lib:${{ github.workspace }}/relay-perl/lib
      PERL_LOCAL_LIB_ROOT: /home/runner/perl5
      PERL_MB_OPT: --install_base /home/runner/perl5
      PERL_MM_OPT: INSTALL_BASE=/home/runner/perl5
    defaults:
      run:
        working-directory: overnet-burner

    steps:
      - uses: actions/checkout@v4
        with:
          path: overnet-burner

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/core-perl
          path: core-perl

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/relay-perl
          path: relay-perl

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'

      - uses: actions/cache@v4
        with:
          path: ~/perl5
          key: perl-devel-cover-5.40-${{ hashFiles('overnet-burner/Makefile.PL', 'overnet-burner/.github/workflows/test.yml') }}

      - name: Install dependencies
        run: |
          cpanm --local-lib ~/perl5 --installdeps .
          cpanm --local-lib ~/perl5 --notest Devel::Cover
          echo "$HOME/perl5/bin" >> "$GITHUB_PATH"

      - name: Enforce per-file coverage floors
        env:
          OVERNET_COVERAGE: '1'
        run: prove -l -v xt/author/devel-cover.t
