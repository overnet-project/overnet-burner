# Random managed local-container profile template. It generates ordinary
# scenario-generation profiles consumed by `overnet-burner generate` and
# `overnet-burner run --random-scenario`.
template_version: 1
profile:
  environment:
    kind: local-containers

  duration:
    random_range: { min: 5, max: 30, min_width: 0 }

  relays:
    random_range: { min: 1, max: 1 }

  roles:
    publishers:
      random_range: { min: 1, max: 3 }
    subscribers:
      random_range: { min: 1, max: 3 }
    query_readers:
      random_range: { min: 0, max: 2 }
    object_readers:
      random_range: { min: 0, max: 2 }
    observers:
      random_range: { min: 0, max: 1 }

  workload:
    publish_rate_per_second:
      random_range: { min: 1, max: 50 }
    query_rate_per_second:
      random_range: { min: 1, max: 10 }
    object_read_rate_per_second:
      random_range: { min: 1, max: 5 }
    abuse_publish_rate_per_second:
      random_range: { min: 1, max: 200 }

  chaos:
    max_hooks:
      one_of: [0, 0, 1]
    actions: [restart, stop, start]
