# A broader local profile that exercises resilience with honest load plus the
# rate-only abuse roles. It expects Overnet-compatible relays to be reachable at
# the listed local endpoints. See docs/generate.md.
duration:
  min: 10
  max: 40
relays:
  min: 1
  max: 2
  provider: generic-relay
  endpoints:
    - ws://127.0.0.1:7777
    - ws://127.0.0.1:7778
roles:
  publishers:           { min: 1, max: 4 }
  subscribers:          { min: 1, max: 4 }
  query_readers:        { min: 0, max: 2 }
  object_readers:       { min: 0, max: 2 }
  observers:            { min: 1, max: 1 }
  flooders:             { min: 0, max: 2 }
  malformed_publishers: { min: 0, max: 2 }
  replayers:            { min: 0, max: 1 }
  subscription_abusers: { min: 0, max: 1 }
  sybils:               { min: 0, max: 1 }
  connection_floods:    { min: 0, max: 1 }
workload:
  publish_rate_per_second:       { min: 5, max: 50 }
  query_rate_per_second:         { min: 1, max: 10 }
  object_read_rate_per_second:   { min: 1, max: 5 }
  abuse_publish_rate_per_second: { min: 50, max: 500 }
chaos:
  max_hooks: 0
  actions: [restart, stop, start]
provision:
  workers: [local]
  relays: [local]
